const HISTORY = {"1966": {"president": "Lyndon B. Johnson", "event": "Gemini space missions advance the space race; Vietnam War escalates with 385,000 US troops deployed; Stokely Carmichael popularizes 'Black Power' slogan during Meredith March", "culture": "#1 song: James Brown — 'Papa’s Got a Brand New Bag' defines the birth of funk", "price": "Gas: $0.32/gal · Bread: $0.22 · Avg income: $6,900", "oakland": "Oakland Raiders' third AFL season; Black Panther Party founded in Oakland", "dow": "924", "gas": "0.32", "bread": "0.22", "income": "6,900", "frontpage": "The front page leads with coverage of the Watts Riot aftermath and civil unrest, featuring stories about racial violence and police response. Space race news dominates with reports on Gemini 8 and Soviet space activities.", "oakland_long": "This is the year the Black Panther Party was born, right here in Oakland — Huey Newton and Bobby Seale organizing on the streets of West Oakland, setting up patrols and demanding justice. The Raiders were in their third AFL season, playing at Frank Youell Field before the Coliseum was even finished. Downtown Oakland was still bustling with department stores along Broadway, and the Tribune Tower stood tall as the city's landmark. Families gathered at Lake Merritt on weekends, kids played in DeFremery Park, and the smell of barbecue drifted through every neighborhood on summer evenings. Oakland was a working-class city with a soul — port workers, railroad men, factory hands — and something new was stirring in the air.", "personal_photo": "birthday_book_images/personal_1966.jpg", "personal_caption": "It’s a Boy! — March 16, 1966"}, "1967": {"president": "Lyndon B. Johnson", "event": "Summer of Love in San Francisco; Six-Day War; Thurgood Marshall becomes first Black Supreme Court Justice; Loving v. Virginia strikes down interracial marriage bans", "culture": "#1 song: Aretha Franklin — 'Respect' becomes an anthem for civil rights and feminism", "price": "Gas: $0.33/gal · Bread: $0.22 · Avg income: $7,300", "oakland": "Oakland's anti-draft protests intensify; Raiders reach first AFL Championship", "dow": "853", "gas": "0.33", "bread": "0.22", "income": "7,300", "frontpage": "Front page features a story about GOP revolt and challenges to Governor Reagan's budget proposals. The paper reports on job development initiatives and drive to create jobs in the region.", "oakland_long": "The Summer of Love was happening across the Bay in San Francisco, but Oakland had its own energy — raw, political, and uncompromising. The Black Panthers were growing, and anti-draft protests filled the streets around the Army Induction Center on Clay Street. The Raiders had their best season yet, reaching the AFL Championship game, and the whole city was buzzing about it. Construction crews were everywhere — BART was being built, and the new Coliseum complex was taking shape out by the airport. On Telegraph Avenue, the counterculture was spilling over from Berkeley, and Oakland's jazz clubs on 7th Street still kept the music alive late into the night."}, "1968": {"president": "Lyndon B. Johnson", "event": "MLK and RFK assassinated; Tet Offensive; Apollo 8 orbits the moon; Tommie Smith & John Carlos raise Black Power fists at Mexico City Olympics; Arthur Ashe wins US Open", "culture": "#1 song: Otis Redding — '(Sittin’ On) The Dock of the Bay' released posthumously", "price": "Gas: $0.34/gal · Bread: $0.22 · Avg income: $7,700", "oakland": "Oakland police and Black Panthers clash; Huey Newton trial captivates the nation", "dow": "840", "gas": "0.34", "bread": "0.22", "income": "7,700", "frontpage": "The front page leads with Robert Kennedy's entry into the presidential race following Johnson's decision. Coverage includes reports on fiery auto collisions and military action in Vietnam.", "oakland_long": "Oakland was at the center of the storm. The Black Panthers and the Oakland police clashed repeatedly — Bobby Hutton, just 17, was killed by police in a shootout in West Oakland that made national news. Huey Newton's murder trial packed the Alameda County Courthouse and drew protesters from across the country. But daily life went on: the new Oakland Coliseum opened its doors, BART tunnels were being dug under the Bay, and families still lined up for fried fish at Esther's Orbit Room on 7th Street. The docks were humming, Lake Merritt sparkled, and despite all the turmoil, Oakland's neighborhoods held tight."}, "1969": {"president": "Richard Nixon", "event": "Apollo 11 moon landing; Woodstock; Stonewall riots; Nixon inaugurated; Vietnam War draft lottery begins; Fred Hampton, Black Panther leader, assassinated by Chicago police", "culture": "#1 song: Sly & the Family Stone — 'Everyday People' becomes anthem of unity; Marvin Gaye's 'I Heard It Through the Grapevine'", "price": "Gas: $0.35/gal · Bread: $0.23 · Avg income: $8,389", "oakland": "Oakland Black Panther Party expands free breakfast and health clinic programs; People's Park protests roil Berkeley", "dow": "876", "gas": "0.35", "bread": "0.23", "income": "8,389", "oakland_long": "The Black Panther Party's Free Breakfast for Children program was feeding thousands of kids every morning at churches and community centers across Oakland — a revolutionary act of love that spread nationwide. People's Park protests raged just up the road in Berkeley, and the whole East Bay felt like it was on the edge of something. But Oakland was also a city of block parties and Little League games, of church on Sunday and dominos on the porch. The port was booming, the A's were building something special out at the Coliseum, and the new BART stations were starting to look like the future.", "personal_photo": "birthday_book_images/personal_1969.jpg", "personal_caption": "John Landry, age 3 — BPP Free Breakfast Program volunteer (probably)"}, "1970": {"president": "Richard Nixon", "event": "Kent State shootings; first Earth Day; Apollo 13 survives; Beatles break up; Black Panther Party’s free breakfast program feeds 10,000 children daily", "culture": "Defining album: Marvin Gaye records 'What’s Going On'; Sly & the Family Stone’s 'Thank You' hits #1", "price": "Gas: $0.36/gal · Bread: $0.24 · Avg income: $8,730", "oakland": "Oakland Coliseum hosts major rock concerts; BART construction reshapes the city", "dow": "785", "gas": "0.36", "bread": "0.24", "income": "8,730", "frontpage": "Front page stories focus on international incidents including the hijacking of the freighter Columbia Eagle by Americans. Coverage includes reports on Cambodia, Laos operations, and radar installations.", "oakland_long": "BART construction was literally reshaping the city — streets torn up, stations rising out of the ground, the promise of a modern transit system connecting Oakland to San Francisco and beyond. The Coliseum was now hosting major rock concerts alongside A's and Raiders games, becoming the entertainment hub of the East Bay. The Black Panther Party's free breakfast program was feeding 10,000 children daily across the country, and Oakland remained the movement's beating heart. On weekends, families picnicked at Lake Merritt, shopped at Housewives Market downtown, and kids rode bikes through the tree-lined streets of the flats.", "personal_photo": "birthday_book_images/personal_1970.jpg", "personal_caption": "Young John, early years in Oakland"}, "1971": {"president": "Richard Nixon", "event": "Pentagon Papers published; 26th Amendment lowers voting age to 18; Attica prison uprising; Swann v. Charlotte-Mecklenburg upholds school busing for desegregation; Jesse Jackson founds Operation PUSH", "culture": "#1 album: Marvin Gaye — 'What’s Going On' redefines soul music as social commentary", "price": "Gas: $0.36/gal · Bread: $0.25 · Avg income: $9,028", "oakland": "Oakland A's build dynasty roster; BART nears completion", "dow": "904", "gas": "0.36", "bread": "0.25", "income": "9,028", "frontpage": "The paper leads with stories about campus closure and militant demands at Merritt College. Coverage includes reports on Secretary Rogers' warnings about Middle East tensions and Saigon forces' retreat in Laos.", "oakland_long": "The Oakland A's were building a dynasty — Charlie Finley's colorful, mustachioed squad was becoming the talk of baseball. BART was nearing completion, and you could feel the excitement as test trains ran through the brand-new Transbay Tube. The city was changing fast: downtown was modernizing, the port was expanding, and new apartment complexes were going up in the hills. But the heart of Oakland was still its neighborhoods — the corner stores, the barber shops, the churches that anchored every block. West Oakland's 7th Street was quieter now than its jazz heyday, but the community spirit was unbroken."}, "1972": {"president": "Richard Nixon", "event": "Watergate break-in; Nixon visits China; Munich Olympics massacre; Shirley Chisholm becomes first Black woman to run for president in a major party", "culture": "#1 song: Roberta Flack — 'The First Time Ever I Saw Your Face'; Bill Withers’ 'Lean on Me' hits #1; Stevie Wonder releases 'Talking Book'", "price": "Gas: $0.36/gal · Bread: $0.25 · Avg income: $9,867", "oakland": "Oakland A's win first World Series; BART opens its first line", "dow": "940", "gas": "0.36", "bread": "0.25", "income": "9,867", "frontpage": "Front page focuses on labor disputes and pay board actions affecting longshoremen at Pacific ports. Coverage includes reports on the president's business proposals and potential port walkouts.", "oakland_long": "What a year for Oakland — the A's won the World Series, bringing the city its first major championship, and BART finally opened its first line, whisking riders from Fremont to downtown Oakland in gleaming new trains. The whole city was celebrating. Reggie Jackson, Catfish Hunter, and Vida Blue were local heroes. Meanwhile, Jack London Square was becoming a waterfront destination, the port was one of the busiest on the West Coast, and Oakland's neighborhoods were as vibrant as ever — soul food restaurants, record shops spinning the latest Stevie Wonder, and kids playing ball at every park in town."}, "1973": {"president": "Richard Nixon", "event": "Vietnam ceasefire signed; Watergate hearings; Roe v. Wade; Arab oil embargo begins; National Black Feminist Organization founded", "culture": "#1 song: Stevie Wonder — 'Superstition' from 'Innervisions'; War’s 'The World Is a Ghetto' is year’s best-selling album", "price": "Gas: $0.39/gal · Bread: $0.27 · Avg income: $10,512", "oakland": "Oakland A's win second straight World Series; BART expands across the Bay", "dow": "952", "gas": "0.39", "bread": "0.27", "income": "10,512", "frontpage": "The front page features a story about a Marin County couple's murder case and sentencing for life. Coverage includes reports on police crises and agreements about violence and crime.", "oakland_long": "The A's did it again — back-to-back World Series champions, and Oakland was a baseball city through and through. BART was expanding, with new lines reaching across the East Bay, changing how people moved through the region. The Arab oil embargo hit hard, and gas lines stretched down major streets, but Oaklanders adapted the way they always did — with grit and community. The port continued to grow as a Pacific trade powerhouse, and the Tribune covered it all from its tower on 13th Street. Friday nights meant high school football under the lights, and Sundays meant church, family, and the biggest plate of food you ever saw."}, "1974": {"president": "Richard Nixon / Gerald Ford", "event": "Nixon resigns over Watergate; Ford pardons Nixon; Patty Hearst kidnapped in Berkeley; Hank Aaron hits 715th home run, breaking Babe Ruth’s record", "culture": "#1 song: Stevie Wonder — 'You Haven’t Done Nothin’' from 'Fulfillingness’ First Finale'; Gladys Knight & the Pips’ 'Midnight Train to Georgia'", "price": "Gas: $0.53/gal · Bread: $0.28 · Avg income: $11,197", "oakland": "Oakland A's three-peat World Series champions; Patty Hearst abduction dominates Bay Area news", "dow": "855", "gas": "0.53", "bread": "0.28", "income": "11,197", "frontpage": "Front page stories report on gas station openings on Sundays and energy policy changes. Coverage includes kidnapping incidents and ransom demands in the Midwest.", "oakland_long": "Three-peat — the Oakland A's became the first team in a decade to win three straight World Series, and the city was delirious with pride. But this was also the year Patty Hearst was kidnapped by the SLA from her Berkeley apartment, and the manhunt consumed Bay Area headlines for months. Gas prices were climbing, Watergate was on every TV, and the country felt uneasy — but Oakland's neighborhoods carried on. Kids walked to school past murals painted on liquor store walls, old men played chess in the park, and the smell of fresh bread from the bakeries on East 14th Street (now International Boulevard) mixed with the salt air blowing in from the Bay.", "personal_photo": "birthday_book_images/personal_1974.jpg", "personal_caption": "School photo, Oakland"}, "1975": {"president": "Gerald Ford", "event": "Fall of Saigon ends Vietnam War; Hoffa disappears; Microsoft founded; Arthur Ashe becomes first Black man to win Wimbledon", "culture": "#1 song: Earth, Wind & Fire — 'Shining Star'; The Isley Brothers’ 'Fight the Power'", "price": "Gas: $0.57/gal · Bread: $0.28 · Avg income: $11,800", "oakland": "Warriors win NBA championship; Oakland's port becomes major Pacific trade hub", "dow": "768", "gas": "0.57", "bread": "0.28", "income": "11,800", "frontpage": "The paper leads with coverage of Aristotle Onassis' death and its impact on his widow Jackie. Stories also focus on BART train detection systems and equipment issues.", "oakland_long": "The Warriors won the NBA championship — a stunning upset sweep of the Washington Bullets — and Oakland went absolutely wild. Rick Barry and the boys brought the city its second title in four years, and it felt like Oakland was the sports capital of the world. Down at the port, container shipping was revolutionizing trade, and Oakland's docks were the gateway to the Pacific. BART was now a part of daily life, packed with commuters heading to San Francisco and back. In the hills, families barbecued on their decks overlooking the Bay, and in the flatlands, block parties stretched from house to house, music pouring out of every open window."}, "1976": {"president": "Gerald Ford", "event": "US Bicentennial celebration; Apple Computer founded; Jimmy Carter elected; President Ford officially recognizes Black History Month", "culture": "#1 album: Stevie Wonder — 'Songs in the Key of Life' widely regarded as greatest album ever made", "price": "Gas: $0.59/gal · Bread: $0.30 · Avg income: $12,686", "oakland": "Raiders win Super Bowl XI; Oakland celebrates the Bicentennial", "dow": "999", "gas": "0.59", "bread": "0.30", "income": "12,686", "frontpage": "Front page coverage includes the Patricia Hearst trial, with focus on witness testimony about her appearance and behavior. The paper reports on her seeming dazed during proceedings.", "oakland_long": "America's Bicentennial — and Oakland celebrated with parades, fireworks over the Estuary, and community festivals in every neighborhood. The Raiders were dominant, heading toward their first Super Bowl victory, and Al Davis was the most talked-about man in town. Down on Broadway, the old movie palaces still showed double features, and Chinatown's restaurants were packed every weekend. The city had a kind of gritty elegance — you could walk from the federal buildings downtown past the Tribune Tower, down to Jack London Square, and feel the whole story of the American West in your bones."}, "1977": {"president": "Jimmy Carter", "event": "Star Wars released; Elvis Presley dies; NYC blackout; Voyager launches; 'Roots' miniseries watched by 130 million Americans, sparking national conversation on slavery", "culture": "#1 song: Marvin Gaye — 'Got to Give It Up'; Rose Royce’s 'Car Wash'", "price": "Gas: $0.62/gal · Bread: $0.32 · Avg income: $13,572", "oakland": "Oakland faces post-industrial economic challenges; Raiders remain dominant", "dow": "965", "gas": "0.62", "bread": "0.32", "income": "13,572", "frontpage": "Front page focuses on school construction oversight and missing sprinkler systems in new schools. Coverage includes a story about a reputed crime kingpin and JFK assassination inquiries.", "oakland_long": "The whole country watched 'Roots,' and Oakland's Black community felt the power of that story in a deeply personal way — many families here had their own Great Migration stories, having come from the South to build new lives in the shipyards and factories during WWII. The Raiders were still riding high, and the Coliseum was rocking every Sunday. But the city was starting to feel the effects of deindustrialization — factories were closing, jobs were leaving, and the economic challenges that would define the next decade were beginning to show. Still, Oakland's spirit was intact: the churches, the music, the food, the unshakable sense of community."}, "1978": {"president": "Jimmy Carter", "event": "Camp David Accords; Jonestown massacre; first test-tube baby; Prop 13 passes in California; Regents v. Bakke upholds affirmative action in college admissions", "culture": "#1 song: Chic — 'Le Freak' becomes best-selling single in Atlantic Records history; Donna Summer reigns as Queen of Disco", "price": "Gas: $0.63/gal · Bread: $0.31 · Avg income: $15,064", "oakland": "Prop 13 slashes Oakland's property tax revenue; city services face cuts", "dow": "757", "gas": "0.63", "bread": "0.31", "income": "15,064", "frontpage": "The paper leads with news about Vida Blue being traded to the Giants baseball team. Coverage includes reports on Italian political turmoil, urban guerrilla activity, and Brown administration policies.", "oakland_long": "Proposition 13 hit Oakland like a hammer — property tax revenue was slashed overnight, and city services started to feel the squeeze. Libraries cut their hours, parks went unmaintained, and the effects would ripple for decades. But Oakland was resilient. Chinatown was thriving, the port kept expanding, and the Coliseum was still the best place to watch a game. Vida Blue was traded to the Giants, breaking hearts across town. In the hills, the eucalyptus groves swayed in the fog, and down in the flats, corner stores still extended credit to families they'd known for generations."}, "1979": {"president": "Jimmy Carter", "event": "Iran hostage crisis begins; Three Mile Island; Soviet Union invades Afghanistan; ESPN launches; Sugarhill Gang’s 'Rapper’s Delight' brings hip-hop to mainstream America", "culture": "#1 album: Michael Jackson — 'Off the Wall' redefines pop; 'Don’t Stop ’Til You Get Enough' hits #1", "price": "Gas: $0.86/gal · Bread: $0.33 · Avg income: $16,461", "oakland": "Gas lines hit Oakland; Raiders announce move to Los Angeles", "dow": "846", "gas": "0.86", "bread": "0.33", "income": "16,461", "frontpage": "Front page covers mass teacher layoffs affecting 1,160 educators across Bay Area school districts. A hijacked jetliner incident also dominates coverage.", "oakland_long": "Gas lines snaked down Oakland's major streets as the energy crisis hit home. Raiders fans were devastated to hear Al Davis talking about moving the team to Los Angeles — it felt like a betrayal of everything Oakland had given the franchise. The city was at a crossroads: struggling with budget cuts from Prop 13, watching industries leave, but still holding onto its identity with fierce pride. The hip-hop revolution was just beginning — kids across Oakland were discovering breakdancing and DJing, and the seeds of the Bay Area's own musical identity were being planted in rec centers and garages across the city."}, "1980": {"president": "Jimmy Carter", "event": "John Lennon killed; Mt. St. Helens erupts; US boycotts Moscow Olympics; Reagan elected; Robert L. Johnson founds BET (Black Entertainment Television)", "culture": "#1 song: Kurtis Blow — 'The Breaks' becomes first gold-certified rap single; Stevie Wonder’s 'Hotter Than July'", "price": "Gas: $1.19/gal · Bread: $0.50 · Avg income: $17,710", "oakland": "Oakland mourns Raiders' departure to LA; downtown revitalization efforts begin", "dow": "808", "gas": "1.19", "bread": "0.50", "income": "17,710", "frontpage": "The front page features economic concerns with warnings of a credit crunch coming to America. Coverage includes Carter administration inflation-fighting strategy and economic forecasts.", "oakland_long": "The Raiders left for Los Angeles, and it hurt. Oakland had built them a stadium, filled it every Sunday, and now Al Davis packed up and headed south. It was a gut punch to the city's pride. But Oakland didn't stop — downtown revitalization efforts began in earnest, Jack London Square kept growing, and the port was becoming one of the biggest on the Pacific Rim. In the neighborhoods, life went on: kids played in schoolyards, old-timers gathered at diners for coffee, and the East Oakland hills were still the most beautiful place to watch a sunset over the Bay."}, "1981": {"president": "Ronald Reagan", "event": "Reagan assassination attempt; AIDS first identified; Sandra Day O’Connor joins Supreme Court; MTV launches but initially excludes Black artists; Grandmaster Flash pioneers turntablism", "culture": "#1 song: Rick James — 'Super Freak'; Luther Vandross releases debut 'Never Too Much'", "price": "Gas: $1.31/gal · Bread: $0.52 · Avg income: $19,074", "oakland": "Oakland A's Billy Martin era; city adjusts to life without the Raiders", "dow": "997", "gas": "1.31", "bread": "0.52", "income": "19,074", "frontpage": "Front page headlines focus on nurse retention issues and hospital planning. Coverage includes reports on trial openings and sports updates regarding high school football.", "oakland_long": "Oakland was adjusting to life without the Raiders, but the A's were still here, and Billy Martin brought his fiery brand of baseball to the Coliseum. The city was changing — new immigrants from Southeast Asia were transforming parts of East Oakland and Chinatown, bringing new languages, new food, and new energy. AIDS was just beginning to surface, and San Francisco's Castro District, just across the Bay, would soon be ground zero. Oakland's music scene was evolving too — the clubs on Broadway were shifting from jazz and soul to funk and early hip-hop, and a new generation was finding its voice."}, "1982": {"president": "Ronald Reagan", "event": "Falklands War; Vietnam Veterans Memorial dedicated; Michael Jackson’s 'Thriller' released — becomes best-selling album of all time", "culture": "#1 song: Michael Jackson — 'Billie Jean'; Grandmaster Flash & the Furious Five’s 'The Message' invents conscious rap", "price": "Gas: $1.22/gal · Bread: $0.54 · Avg income: $19,838", "oakland": "Jack London Square redevelopment begins; Oakland faces recession", "dow": "816", "gas": "1.22", "bread": "0.54", "income": "19,838", "frontpage": "The paper leads with the Claus von Bulow murder trial and guilty verdict. International coverage includes Soviet arms freeze announcements and deployment halts on European border.", "oakland_long": "Recession hit Oakland hard. Jack London Square redevelopment was the city's big bet on a comeback — turning the old waterfront into a shopping and dining destination. But in many neighborhoods, times were tough: unemployment was high, storefronts sat empty, and the optimism of the '70s championship era was fading. Still, Oakland's soul endured. The farmers' market at Jack London Square drew crowds every weekend, Lake Merritt was still the jewel of the city, and in living rooms across town, families gathered around the TV to watch Michael Jackson's 'Thriller' video change the world.", "personal_photo": "birthday_book_images/personal_1982.jpg", "personal_caption": "Sharp in Oakland — John and his dad"}, "1983": {"president": "Ronald Reagan", "event": "US invades Grenada; Beirut barracks bombing; Sally Ride first American woman in space; Guion Bluford becomes first Black American in space; Vanessa Williams crowned first Black Miss America; MLK Day signed into law", "culture": "#1 song: Michael Jackson — 'Billie Jean' and 'Thriller' dominate; Alice Walker wins Pulitzer for 'The Color Purple'", "price": "Gas: $1.16/gal · Bread: $0.52 · Avg income: $20,885", "oakland": "Oakland tech industry begins to grow; Lionel Wilson serves as mayor", "dow": "1,130", "gas": "1.16", "bread": "0.52", "income": "20,885", "frontpage": "Front page features Craig Claiborne's food column about chocolate desserts. Coverage includes reports on possible sale of lands and volunteer riders initiatives.", "oakland_long": "Oakland's tech industry was starting to take root — the corridor along the 880 freeway was attracting small companies, and the East Bay was positioning itself as a more affordable alternative to Silicon Valley. Mayor Lionel Wilson, the city's first Black mayor, was working to balance development with the needs of Oakland's diverse communities. On Saturdays, Oaklanders shopped at the Eastmont Mall, caught a movie at the Grand Lake Theatre, and took their kids to the zoo in the hills. The A's were rebuilding, but the Coliseum still drew families for Sunday afternoon games."}, "1984": {"president": "Ronald Reagan", "event": "Los Angeles Olympics; Bhopal disaster; Apple launches Macintosh; Reagan wins 49 states; Jesse Jackson makes historic run for president", "culture": "#1 song: Prince — 'When Doves Cry' from 'Purple Rain'; first artist with simultaneous #1 film, album, and single", "price": "Gas: $1.13/gal · Bread: $0.55 · Avg income: $22,415", "oakland": "Oakland hosts Olympic soccer matches; East Bay tech corridor emerging", "dow": "1,164", "gas": "1.13", "bread": "0.55", "income": "22,415", "frontpage": "The paper leads with a gunman shooting at the White House and a manhunt story. Coverage includes reports on a Miami cop jury acquittal in a shooting case.", "oakland_long": "Oakland hosted Olympic soccer matches at the Coliseum, putting the city on the world stage. The East Bay tech corridor was growing, and young professionals were starting to discover Oakland's charms — the Victorian homes, the restaurants, the proximity to San Francisco at half the rent. But the crack epidemic was beginning to touch Oakland's streets, and the next few years would test the city like never before. For now, though, there was still innocence in the neighborhoods — ice cream trucks in summer, double-dutch on the sidewalk, and Prince's 'Purple Rain' blasting from every boombox.", "personal_photo": "birthday_book_images/personal_1984.jpg", "personal_caption": "Graduation day — John and his dad"}, "1985": {"president": "Ronald Reagan", "event": "Live Aid concert; Gorbachev becomes Soviet leader; NES launches; MOVE bombing in Philadelphia kills 11 including 5 children, destroys 61 homes", "culture": "#1 song: Whitney Houston — 'Saving All My Love for You' from debut album; Run-D.M.C.’s 'King of Rock' pushes hip-hop into rock crossover", "price": "Gas: $1.12/gal · Bread: $0.55 · Avg income: $23,618", "oakland": "Oakland's crack epidemic begins to impact neighborhoods; A's rebuild under new management", "dow": "1,267", "gas": "1.12", "bread": "0.55", "income": "23,618", "frontpage": "Front page focuses on federal irrigation water policy and comment laws. Coverage includes reports from the Ohio governor.", "oakland_long": "The crack epidemic arrived in Oakland, and it would devastate communities for years to come. Neighborhoods that had been tight-knit for decades began to fray as addiction and the violence of the drug trade took hold. But Oakland fought back — churches organized, community groups mobilized, and ordinary people refused to let their neighborhoods be defined by the worst of what was happening. The A's were rebuilding under new management, downtown Oakland was still trying to find its footing, and the Tribune chronicled it all from its tower — the good, the bad, and everything in between."}, "1986": {"president": "Ronald Reagan", "event": "Challenger disaster; Chernobyl; Iran-Contra scandal; Oprah Winfrey Show goes national; first MLK Jr. federal holiday observed; Aretha Franklin first woman inducted into Rock and Roll Hall of Fame", "culture": "#1 song: Dionne Warwick — 'That’s What Friends Are For'; Run-D.M.C.’s 'Raising Hell' becomes hip-hop’s first multi-platinum album", "price": "Gas: $0.89/gal · Bread: $0.56 · Avg income: $24,897", "oakland": "Oakland tackles rising crime rates; Bay Area housing costs climb", "dow": "1,792", "gas": "0.89", "bread": "0.56", "income": "24,897", "frontpage": "The front page leads with speculation about NFL expansion and Oakland's chances of gaining a franchise. Coverage includes St. Patrick's Day parade activities in the East Bay region.", "oakland_long": "Oakland was grappling with rising crime, but the city's spirit was unbreakable. The first Martin Luther King Jr. federal holiday was observed, and Oakland — birthplace of the Black Panther Party and home to one of the most politically engaged Black communities in America — celebrated with particular meaning. Housing costs in the Bay Area were climbing, and Oakland was starting to feel the pressure that would eventually transform the city. But in 1986, you could still buy a beautiful Victorian in West Oakland for a song, eat at Nellie's Soul Food on MacArthur, and watch the ships come in at the port as the sun set over the Golden Gate."}, "1987": {"president": "Ronald Reagan", "event": "Black Monday stock crash; Iran-Contra hearings; Reagan’s 'tear down this wall' speech; Toni Morrison publishes 'Beloved'", "culture": "#1 song: Eric B. & Rakim — 'Paid in Full' redefines hip-hop lyricism; Public Enemy releases 'Yo! Bum Rush the Show'", "price": "Gas: $0.90/gal · Bread: $0.54 · Avg income: $26,061", "oakland": "Stock market crash rattles Bay Area economy; A's Jose Canseco era begins", "dow": "2,276", "gas": "0.90", "bread": "0.54", "income": "26,061", "frontpage": "Front page headlines are not clearly legible from the scan.", "oakland_long": "The stock market crashed on Black Monday, and the economic shockwaves hit the Bay Area hard. But at the Coliseum, something exciting was happening — a young Cuban slugger named Jose Canseco was crushing home runs, and the A's were building a team that would dominate the American League. Oakland's neighborhoods were diverse and vibrant: Ethiopian restaurants were opening along Telegraph, taco trucks lined International Boulevard, and Chinatown's dim sum houses were packed every weekend. The Tribune Tower still anchored the skyline, and on clear days from the hills you could see all the way to Mount Tamalpais."}, "1988": {"president": "Ronald Reagan", "event": "George H.W. Bush elected; Pan Am Flight 103 bombed; Florence Griffith Joyner wins 3 gold medals at Seoul Olympics; Jesse Jackson wins Michigan caucuses", "culture": "#1 song: Bobby Brown — 'My Prerogative'; NWA’s 'Straight Outta Compton' launches gangsta rap; Tracy Chapman’s 'Fast Car'", "price": "Gas: $0.91/gal · Avg income: $27,225", "oakland": "Oakland A's reach World Series; Bash Brothers era", "dow": "2,087", "gas": "0.91", "bread": "", "income": "27,225", "frontpage": "The paper leads with news that the Cardinals are relocating from the Bay Area and commentary on East Bay football prospects. Coverage includes a report on Berkeley voting down a Palestinian sister city proposal.", "oakland_long": "The Bash Brothers era was in full swing — Canseco and McGwire were launching moonshots at the Coliseum, and the A's reached the World Series. Oakland felt electric. NWA released 'Straight Outta Compton,' and across the Bay, Oakland's own hip-hop scene was percolating — Too Short was already a legend in the town, and MC Hammer was about to break through. The city was a collision of cultures: old-school soul food joints next to new Vietnamese restaurants, Black churches next to Buddhist temples, punk clubs next to salsa halls. That was Oakland — always had been, always would be.", "personal_photo": "birthday_book_images/personal_1988.jpg", "personal_caption": "John and Sheneen, dressed to impress"}, "1989": {"president": "George H.W. Bush", "event": "Berlin Wall falls; Tiananmen Square; Exxon Valdez oil spill; Douglas Wilder elected first Black governor (Virginia); Colin Powell becomes chairman of Joint Chiefs of Staff", "culture": "#1 song: Public Enemy — 'Fight the Power' (from Spike Lee’s 'Do the Right Thing'); De La Soul’s 'Three Feet High and Rising'", "price": "Gas: $1.00/gal · Avg income: $28,906", "oakland": "Loma Prieta earthquake devastates Oakland; Cypress Freeway collapse kills 42", "dow": "2,292", "gas": "1.00", "bread": "", "income": "28,906", "frontpage": "The front page features a major story on technology's dual nature with both progress and potential for destruction. Coverage includes a large affordable housing plan worth $4.1 billion.", "oakland_long": "The Loma Prieta earthquake struck at 5:04 PM on October 17th, right as the A's and Giants were about to play Game 3 of the World Series at Candlestick Park. In Oakland, the Cypress Freeway structure collapsed, killing 42 people, most of them in their cars on the way home from work. It was the worst disaster in the city's history. The double-decker freeway pancaked in West Oakland, and rescue workers dug through rubble for days. The whole city came together — neighbors pulled strangers from wreckage, shelters opened overnight, and Oakland showed what community really means when everything falls apart."}, "1990": {"president": "George H.W. Bush", "event": "Iraq invades Kuwait; Hubble Space Telescope launched; Nelson Mandela freed after 27 years; David Dinkins serves as first Black mayor of New York City", "culture": "#1 song: MC Hammer — 'U Can’t Touch This'; Public Enemy’s 'Fear  was extraordinary — neighbors took in strangers, donations poured in, and the city began the long process of rebuilding. Through it all, the Tribune was there, covering every story, every loss, every act of courage.", "personal_photo": "birthday_book_images/personal_1991.jpg", "personal_caption": "John and Sheneen"}, "1992": {"president": "George H.W. Bush", "event": "LA riots after Rodney King verdict; Clinton elected; Cold War officially ends; Mae Jemison becomes first Black woman in space", "culture": "#1 song: Boyz II Men — 'End of the Road' sets record with 13 weeks at #1; Dr. Dre’s 'The Chronic' launches West Coast rap", "price": "Gas: $1.13/gal · Avg income: $30,636", "oakland": "Oakland rebuilds from Hills fire; Elihu Harris becomes mayor", "dow": "3,236", "gas": "1.13", "bread": "", "income": "30,636", "frontpage": "Four Pac 10 teams are preparing to play in the NCAA tournament. Clinton's campaign is covered as a major story.", "oakland_long": "Oakland was still healing from the Hills fire when the LA riots erupted after the Rodney King verdict. Tensions were high across the Bay Area, but Oakland channeled its anger into organizing rather than destruction. Elihu Harris became mayor, and the city focused on rebuilding — both the fire-damaged hills and the communities struggling with poverty and violence in the flatlands. Dr. Dre dropped 'The Chronic,' and West Coast hip-hop was suddenly the center of the music universe. Too Short was still Oakland's king, and a new generation of Bay Area rappers was rising."}, "1993": {"president": "Bill Clinton", "event": "World Trade Center bombing; Waco siege; NAFTA signed; Toni Morrison wins Nobel Prize in Literature, first Black woman to receive the honor", "culture": "#1 song: Whitney Houston — 'I Will Always Love You'; Wu-Tang Clan’s debut 'Enter the Wu-Tang (36 Chambers)' redefines hip-hop", "price": "Gas: $1.11/gal · Avg income: $31,241", "oakland": "Oakland port expansion; city works on post-earthquake infrastructure", "dow": "3,442", "gas": "1.11", "bread": "", "income": "31,241", "frontpage": "The front page features an article on rising Asian-American author Fae Myenne Ng. The paper reports on the East Bay needing businesses that create jobs as federal aid proves insufficient.", "oakland_long": "Oakland's port was expanding again, and the city was slowly finding its economic footing after the earthquake and the fire. Jack London Square was coming alive with new restaurants, and the first signs of Oakland's future as a foodie destination were emerging. In the neighborhoods, life had a rhythm: Sunday service, Monday Night Football at the sports bar, fish fry Fridays, and the constant soundtrack of Oakland — car stereos rattling with bass, church choirs on Sunday morning, and the distant hum of cranes at the port loading containers bound for Asia.", "personal_photo": "birthday_book_images/personal_1993.jpg", "personal_caption": "John and Sheneen — the big day"}, "1994": {"president": "Bill Clinton", "event": "O.J. Simpson chase and trial; Rwandan genocide; Nelson Mandela elected president of South Africa; Carol Moseley-Braun serves as first Black woman U.S. Senator", "culture": "#1 album: Nas — 'Illmatic' is hailed as greatest hip-hop album ever; Mary J. Blige’s 'My Life' defines ’90s R&B; Notorious B.I.G.’s debut 'Ready to Die'", "price": "Gas: $1.11/gal · Avg income: $32,264", "oakland": "Raiders return to Oakland; Jack London Square thrives", "dow": "3,849", "gas": "1.11", "bread": "", "income": "32,264", "frontpage": "The Warriors make quick work of the Bullets in a sports story. A federal study shows that prosecution under federal drug laws targets minorities disproportionately.", "oakland_long": "The Raiders came home! After 12 years in Los Angeles, the silver and black returned to Oakland, and the city celebrated like a long-lost family member had finally walked back through the door. The Coliseum was renamed and renovated, and Raider Nation was reborn in the town that had always kept the faith. Jack London Square was thriving, and downtown Oakland was showing new life. Meanwhile, Too Short, Spice 1, and the whole Oakland rap scene were thriving, and the Bay Area's hyphy movement was starting to take shape in the underground."}, "1995": {"president": "Bill Clinton", "event": "Oklahoma City bombing; O.J. acquitted; Windows 95 launches; Million Man March draws hundreds of thousands to Washington D.C.", "culture": "#1 song: Coolio — 'Gangsta’s Paradise'; 2Pac releases 'Me Against the World' from prison — debuts at #1", "price": "Gas: $1.15/gal · Avg income: $34,076", "oakland": "Oakland Raiders' first season back; dot-com boom begins reshaping the East Bay", "dow": "4,054", "gas": "1.15", "bread": "", "income": "34,076", "frontpage": "The NFL votes down the proposed Rams move to St. Louis. Tour groups are being hit by the ongoing baseball strike.", "oakland_long": "The Raiders' first season back in Oakland was a homecoming party that lasted all year. The dot-com boom was just beginning to reshape the Bay Area, and Oakland — always more affordable than San Francisco — was starting to attract a new wave of residents drawn by the Victorian houses, the diversity, and the culture. Downtown lofts were being converted from old warehouses, and the arts scene was exploding. But the city still had deep challenges: poverty, crime, and failing schools that a tech boom alone couldn't fix."}, "1996": {"president": "Bill Clinton", "event": "Clinton reelected; Dolly the sheep cloned; Olympics in Atlanta; TWA Flight 800; 2Pac and Notorious B.I.G. both killed within 6 months", "culture": "#1 album: Fugees — 'The Score' sells 22 million copies worldwide; 2Pac’s 'All Eyez on Me' drops as first double-disc in hip-hop", "price": "Gas: $1.23/gal · Avg income: $35,492", "oakland": "Oakland tech sector booms; Jerry Brown runs for mayor", "dow": "5,584", "gas": "1.23", "bread": "", "income": "35,492", "frontpage": "Santa Clara defeats Maryland to advance in tournament play, facing No. 1 seed UMass. UC plans to build new headquarters in downtown Oakland on a vacant 12th Street lot.", "oakland_long": "Jerry Brown — former governor, former presidential candidate, and Oakland's most unlikely political figure — ran for mayor, promising to bring 10,000 new residents downtown. Oakland was on the cusp of transformation. The tech boom was sending ripples across the Bay, housing prices were climbing, and young professionals were discovering that Oakland had everything San Francisco did, minus the attitude. At the Coliseum, the A's and Raiders shared the facility, and on weekends, the Grand Lake Theatre marquee blazed with movie titles and political messages for all of Lakeshore Avenue to see."}, "1997": {"president": "Bill Clinton", "event": "Princess Diana dies; Hong Kong returned to China; Titanic released; Million Woman March draws 750,000 to Philadelphia; Tiger Woods wins Masters at 21", "culture": "#1 album: Notorious B.I.G. — 'Life After Death' released 16 days after his murder; Missy Elliott’s debut 'Supa Dupa Fly' reinvents the music video", "price": "Gas: $1.23/gal · Avg income: $37,005", "oakland": "Jerry Brown becomes Oakland mayor; promises to bring 10,000 residents downtown", "dow": "6,935", "gas": "1.23", "bread": "", "income": "37,005", "frontpage": "Cal advances to the Sweet 16 in the NCAA Tournament. A local novelist mixes Bengali film tales with East Bay setting.", "oakland_long": "Jerry Brown took office as mayor and immediately started shaking things up — military-style charter schools, downtown development plans, and a vision to make Oakland a destination rather than San Francisco's shadow. The city was buzzing with possibility. New restaurants opened on Piedmont Avenue, loft conversions accelerated downtown, and the arts community was thriving in warehouse spaces that hadn't yet been priced out. The A's were in a rebuilding phase, but the Coliseum was still the gathering place, and on warm evenings, all of Oakland seemed to come alive."}, "1998": {"president": "Bill Clinton", "event": "Clinton-Lewinsky scandal; Google founded; Mark McGwire hits 70 home runs; Lauryn Hill’s 'Miseducation' becomes first hip-hop album to win Grammy Album of the Year", "culture": "#1 album: Lauryn Hill — 'The Miseducation of Lauryn Hill' wins 5 Grammys; OutKast’s 'Aquemini' pushes Southern rap forward", "price": "Gas: $1.06/gal · Avg income: $38,885", "oakland": "Dot-com boom transforms Oakland real estate; downtown lofts surge", "dow": "8,602", "gas": "1.06", "bread": "", "income": "38,885", "frontpage": "Front page headlines are not clearly legible from the scan.", "oakland_long": "The dot-com boom was transforming Oakland's real estate overnight. Downtown lofts that nobody wanted five years ago were suddenly hot properties. Young tech workers priced out of San Francisco were flooding into Oakland, drawn by the same things that had always made the city special — the diversity, the food, the culture, the stunning views from the hills. Lauryn Hill's 'Miseducation' was on every stereo, and Oakland's own music scene was evolving: from Too Short's pimp rap to the emerging hyphy sound that would soon define the town."}, "1999": {"president": "Bill Clinton", "event": "Columbine shooting; Y2K panic; Euro currency introduced; Serena Williams wins U.S. Open at 17, first Black woman to win a Grand Slam since Althea Gibson in 1958", "culture": "#1 song: TLC — 'No Scrubs'; Destiny’s Child’s 'The Writing’s on the Wall' launches Beyoncé to stardom", "price": "Gas: $1.17/gal · Avg income: $40,696", "oakland": "Oakland rides the dot-com wave; housing prices skyrocket", "dow": "10,056", "gas": "1.17", "bread": "", "income": "40,696", "frontpage": "San Francisco loses the bid for Super Bowl 2003, with Eddie DeBartolo expected to be fined $1 million. The paper reports on MTBE water risks being withheld.", "oakland_long": "Oakland was riding the dot-com wave, and the city felt like it was on the verge of something big. Housing prices were skyrocketing, and long-time residents were starting to feel the squeeze of what would become the defining tension of the next two decades: growth versus displacement. New coffee shops and galleries were popping up in formerly industrial neighborhoods, and Jack London Square was packed on weekends. The Y2K scare had everyone a little nervous, but Oakland had survived earthquakes, fires, and economic collapse — a computer glitch wasn't going to faze this town.", "personal_photo": "birthday_book_images/personal_1999.jpg", "personal_caption": "The Landry house, Oakland"}, "2000": {"president": "Bill Clinton", "event": "Bush v. Gore disputed election; dot-com bubble bursts; USS Cole bombing; all 50 US states finally adopt Martin Luther King Jr. Day", "culture": "#1 album: D’Angelo — 'Voodoo' wins Grammy for Best R&B Album; OutKast’s 'Stankonia' named album of the year by critics", "price": "Gas: $1.51/gal · Avg income: $41,990", "oakland": "Dot-com bust hits Oakland hard; tech layoffs sweep the Bay", "dow": "10,595", "gas": "1.51", "bread": "", "income": "41,990", "frontpage": "Cal nets an NIT win over Long Beach State and will host Georgetown in the next round. An Oakland skyline development features a proposed 10-story building at 17th and Broadway.", "oakland_long": "The dot-com bubble burst, and Oakland felt the aftershocks immediately. Tech layoffs swept the Bay Area, and the loft conversions and restaurant openings that had defined the late '90s suddenly slowed down. But Oakland's core — the port, the neighborhoods, the communities that had been here long before the tech boom — carried on. Lake Merritt was still beautiful on a Sunday morning, Chinatown's markets were still packed on Saturdays, and the Coliseum was still the place where Oakland came together, win or lose."}, "2001": {"president": "George W. Bush", "event": "September 11 attacks; War in Afghanistan begins; National Museum of African American History and Culture established by Congress", "culture": "#1 album: Alicia Keys — 'Songs in A Minor' sells 236,000 copies in first week; Jay-Z’s 'The Blueprint' drops September 11th", "price": "Gas: $1.46/gal · Avg income: $42,228", "oakland": "Oakland reels from 9/11 aftermath; port security tightens dramatically", "dow": "9,823", "gas": "1.46", "bread": "", "income": "42,228", "frontpage": "Stanford faces off in first-round NCAA Tournament play. The paper reports on Wall Street regaining composure and covers an energy chief calling power blackouts inevitable.", "oakland_long": "September 11th changed everything, and Oakland felt it deeply. The port — one of the busiest in the country — went on high alert overnight. Security was tightened at the airport, at BART stations, everywhere. But Oakland also came together in the way it always did: candlelight vigils at Lake Merritt, interfaith services, neighbors checking on neighbors. The city's large Middle Eastern and Muslim communities faced a wave of fear and suspicion, and Oakland's progressive activist tradition kicked in to protect them.", "personal_photo": "birthday_book_images/personal_2001.jpg", "personal_caption": "Storytime with Dad"}, "2002": {"president": "George W. Bush", "event": "Department of Homeland Security created; Bali bombings; Halle Berry becomes first Black woman to win Academy Award for Best Actress; Denzel Washington wins Best Actor same night", "culture": "#1 song: Nelly — 'Hot in Herre'; Eminem’s 'Lose Yourself' first rap song to win an Oscar", "price": "Gas: $1.36/gal · Avg income: $42,409", "oakland": "Oakland A's 20-game win streak (Moneyball season); Raiders reach Super Bowl", "dow": "10,501", "gas": "1.36", "bread": "", "income": "42,409", "frontpage": "Oakland Tech eyes a basketball title facing De La Salle. Cal starts with a bang facing Pitt in the next round of tournament play.", "oakland_long": "This was the Moneyball year — Billy Beane's Oakland A's won 20 consecutive games, the longest streak in American League history, and the whole country was watching. The Coliseum was rocking, and for a few magical weeks, Oakland was the center of the baseball universe. The Raiders made it to the Super Bowl, and the city hadn't been this sports-crazy since the '70s dynasty years. On a personal note, your family was preparing for a big change — the move from Oakland to Evanston was coming, and your dad was saying goodbye to the only city he'd ever called home."}, "2003": {"president": "George W. Bush", "event": "Iraq War begins; Columbia shuttle disaster; Saddam Hussein captured", "culture": "#1 song: 50 Cent — 'In Da Club'; OutKast’s 'Hey Ya!' becomes inescapable; Beyoncé’s solo debut 'Dangerously in Love'", "price": "Gas: $1.59/gal · Avg income: $42,992", "oakland": "Raiders lose Super Bowl XXXVII; anti-war protests fill Oakland streets", "dow": "8,194", "gas": "1.59", "bread": "", "income": "42,992", "frontpage": "Oakland Tech wins the NC Division 1 championship with a 60-48 victory over Valley High. A faith columnist advises investors not to abandon the stock market.", "oakland_long": "The Raiders lost the Super Bowl badly, and Oakland started the year with a hangover. Then the Iraq War began, and Oakland's streets filled with anti-war protesters — this was a city with a long tradition of political activism, from the Panthers to the anti-draft movement to the anti-apartheid campaigns of the '80s. The Tribune covered the protests from its tower on 13th Street, and the debates raged in every barbershop and coffee shop in town. Meanwhile, your dad was settling into life in Evanston, 2,100 miles from the city he loved."}, "2004": {"president": "George W. Bush", "event": "Indian Ocean tsunami; Facebook launches; Bush reelected; Abu Ghraib scandal", "culture": "#1 album: Usher — 'Confessions' is last R&B album to go Diamond; Kanye West’s debut 'The College Dropout' redefines hip-hop", "price": "Gas: $1.88/gal · Avg income: $44,334", "oakland": "Ron Dellums campaigns for mayor; Oakland housing market heats up", "dow": "10,240", "gas": "1.88", "bread": "", "income": "44,334", "frontpage": "Low-cost airlines give a lift to Oakland Airport with continued growth for the seventh year. Stewart resigns from the board as Chavez nears a deal to stay with the A's.", "oakland_long": "Oakland was in transition. The housing market was heating up again after the dot-com bust, and the gentrification debates that would define the next two decades were getting louder. Old Victorians in West Oakland that had sold for $100,000 a few years ago were now going for three times that. Ron Dellums was campaigning for mayor, promising to bring Oakland's old progressive spirit back. Low-cost airlines were turning Oakland Airport into a real alternative to SFO, and the city was becoming more connected to the rest of the country."}, "2005": {"president": "George W. Bush", "event": "Hurricane Katrina devastates Gulf Coast, disproportionately impacting Black communities; YouTube launches; Pope John Paul II dies; Kanye West declares 'George Bush doesn’t care about Black people' on live TV", "culture": "#1 song: Mariah Carey — 'We Belong Together'; Kanye West’s 'Late Registration' and 'Gold Digger'", "price": "Gas: $2.30/gal · Avg income: $46,326", "oakland": "Oakland gentrification debates intensify; West Oakland transforms", "dow": "10,745", "gas": "2.30", "bread": "", "income": "46,326", "frontpage": "The main headline reads 'Schools bring up ranks’ rear' — Oakland schools climb from the bottom of state API rankings. Ex-WorldCom chief Bernard Ebbers is found guilty of fraud and sentenced to 30-to-life. DuPont and 3M announce plans to cut a nonstick chemical linked to cancer. CSU freshmen are found to still fall short on basics.", "oakland_long": "Gentrification was the word on everyone's lips. West Oakland, the neighborhood where the Black Panthers were born, where the Pullman Porters had built a community, where blues and jazz had thrived on 7th Street — was transforming fast. New condos were going up, prices were climbing, and long-time residents were being pushed out. It was a painful, complicated story, and it was happening in real time. But Oakland's culture was also thriving: the food scene was exploding, the arts community was vibrant, and the city's diversity remained its greatest strength.", "personal_photo": "birthday_book_images/personal_2005.jpg", "personal_caption": "Proud dad — 8th grade graduation"}, "2006": {"president": "George W. Bush", "event": "Twitter launches; Pluto demoted from planet status; Saddam Hussein executed", "culture": "#1 album: Beyoncé — 'B’Day' drops on her 25th birthday; J Dilla’s 'Donuts' released 3 days before his death becomes a hip-hop production classic", "price": "Gas: $2.59/gal · Avg income: $48,201", "oakland": "Ron Dellums becomes Oakland mayor; city tackles crime reduction", "dow": "11,253", "gas": "2.59", "bread": "", "income": "48,201", "frontpage": "A man could become the first African-American in top NASCAR racing since 1987. The paper reports on an FBI investigation into state Senator Perata's dealings.", "oakland_long": "Ron Dellums became mayor, bringing a legendary civil rights and political career to Oakland's City Hall. The city was working hard on crime reduction — homicide rates had been stubbornly high, and Dellums promised a new approach. The Bay Area housing bubble was inflating fast, and Oakland was caught up in it — home prices were at record highs, and the subprime mortgages that would soon cause catastrophe were being written all over East Oakland. But nobody knew that yet. On Friday nights, the Grand Lake Theatre still lit up, and Oakland's restaurant scene was becoming one of the best in the country."}, "2007": {"president": "George W. Bush", "event": "iPhone released; Virginia Tech shooting; financial crisis begins; housing bubble pops", "culture": "#1 song: Beyoncé — 'Irreplaceable'; Kanye West’s 'Graduation' outsells 50 Cent’s 'Curtis' in rap’s biggest sales showdown", "price": "Gas: $2.80/gal · Avg income: $50,233", "oakland": "Oakland housing market crashes; foreclosures sweep East Oakland", "dow": "12,159", "gas": "2.80", "bread": "", "income": "50,233", "frontpage": "The Cardinal's Lopez twins hint they'll stay at Stanford after a tournament loss to Louisville. The paper covers new-style wizardry casting a spell on the Bay Area.", "oakland_long": "The housing bubble popped, and Oakland was ground zero. East Oakland was devastated by foreclosures — block after block of empty homes with bank-owned signs in the yard. Families who had stretched to buy their piece of the American Dream lost everything. The iPhone was released and the tech world shifted again, but for Oakland's working-class neighborhoods, the financial crisis was a catastrophe that would take years to recover from. The A's kept playing at the Coliseum, and the Lake Merritt farmers' market kept drawing crowds, but there was a heaviness in the air."}, "2008": {"president": "George W. Bush", "event": "Barack Obama elected first Black president; global financial collapse; Lehman Brothers fails", "culture": "#1 album: Lil Wayne — 'Tha Carter III' sells 1 million in first week; T-Pain & Kanye West’s '808s & Heartbreak' reshapes hip-hop forever", "price": "Gas: $3.27/gal · Avg income: $50,303", "oakland": "Oscar Grant shot by BART police on New Year's; Oakland erupts in protest", "dow": "11,951", "gas": "3.27", "bread": "", "income": "50,303", "frontpage": "A mill town becomes an urban success story in the feature 'Saving Minneapolis.' Mack basketball team caps an undefeated season with a state title victory.", "oakland_long": "In the early hours of New Year's Day, BART police officer Johannes Mehserle shot and killed Oscar Grant, a 22-year-old Black man, on the Fruitvale BART platform. The shooting was captured on cell phone video and sparked outrage across Oakland and the nation. It was a watershed moment — years before Ferguson, years before the phrase 'Black Lives Matter' existed, Oakland was grappling with police violence and systemic racism in a way that would eventually reshape the national conversation. And then, in November, Barack Obama was elected president, and Oakland celebrated in the streets like never before."}, "2009": {"president": "Barack Obama", "event": "Obama inaugurated as 44th President; Eric Holder confirmed as first Black Attorney General; Michael Jackson dies; stimulus bill signed", "culture": "#1 song: Black Eyed Peas — 'Boom Boom Pow'; Kid Cudi’s 'Man on the Moon' launches psychedelic rap; Drake’s 'So Far Gone' introduces a new generation", "price": "Gas: $2.35/gal · Avg income: $49,777", "oakland": "Oscar Grant trial dominates Oakland news; Johannes Mehserle charged", "dow": "7,216", "gas": "2.35", "bread": "", "income": "49,777", "frontpage": "A car mileage proposal puts privacy concerns at issue.", "oakland_long": "The Oscar Grant case dominated Oakland's consciousness. Johannes Mehserle was charged with murder, and the trial became a national story about race, policing, and justice. 'Fruitvale Station' would later tell this story to the world. Oakland was also dealing with the aftermath of the financial crisis — budget cuts, layoffs, closed community centers. But the city's activist spirit burned brighter than ever. On a lighter note, the Warriors were still terrible, but Oakland kept showing up to Oracle Arena, because that's what this city does — it shows up.", "personal_photo": "birthday_book_images/personal_2009.jpg", "personal_caption": "Family photo — graduation day"}, "2010": {"president": "Barack Obama", "event": "Deepwater Horizon oil spill; Haiti earthquake; Affordable Care Act signed; iPad launched", "culture": "#1 album: Kanye West — 'My Beautiful Dark Twisted Fantasy' hailed as decade’s greatest album; Nicki Minaj’s 'Pink Friday' debut", "price": "Gas: $2.79/gal · Avg income: $49,445", "oakland": "Mehserle verdict sparks Oakland protests; Jean Quan elected mayor", "dow": "10,642", "gas": "2.79", "bread": "", "income": "49,445", "frontpage": "Front page headlines are not clearly legible from the scan.", "oakland_long": "The Mehserle verdict came down — involuntary manslaughter, not murder — and Oakland erupted in protest. Windows were smashed downtown, tear gas filled the air, and the anger was raw and real. Jean Quan was elected as the city's first Asian-American mayor, reflecting Oakland's incredible diversity. The city was still struggling economically, but there were signs of hope: new businesses were opening in Uptown, the First Friday art walks were drawing thousands, and Oakland was starting to be recognized as one of the most exciting cities in America.", "personal_photo": "birthday_book_images/personal_2010.jpg", "personal_caption": "The Landry family"}, "2011": {"president": "Barack Obama", "event": "Osama bin Laden killed; Arab Spring; Occupy Wall Street; Fukushima disaster", "culture": "#1 album: Jay-Z & Kanye West — 'Watch the Throne'; Adele’s 'Rolling in the Deep'; Frank Ocean’s 'Nostalgia, Ultra' launches Odd Future into the mainstream", "price": "Gas: $3.53/gal · Avg income: $50,054", "oakland": "Occupy Oakland takes Frank Ogawa Plaza; tear gas and mass arrests", "dow": "11,984", "gas": "3.53", "bread": "", "income": "50,054", "frontpage": "The front page features Digger's Diner and a section on 'Beyond Bacon.' The paper covers disaster aftermath reporting.", "oakland_long": "Occupy Oakland took over Frank Ogawa Plaza (which protesters renamed Oscar Grant Plaza) and turned it into a tent city that made international headlines. When police moved in with tear gas and flash grenades, the images went around the world. Iraq War veteran Scott Olsen was critically injured by a police projectile, and Oakland became the face of the Occupy movement nationwide. It was chaotic, messy, inspiring, and very Oakland — a city that has never been afraid to stand up and make noise when something isn't right."}, "2012": {"president": "Barack Obama", "event": "Obama reelected; Sandy Hook shooting; Hurricane Sandy; Trayvon Martin killed in Florida, sparking national outrage", "culture": "#1 album: Kendrick Lamar — 'good kid, m.A.A.d city' revives West Coast storytelling rap; Frank Ocean’s 'Channel Orange'", "price": "Gas: $3.64/gal · Avg income: $51,017", "oakland": "Oakland sees tech spillover from SF; new restaurants and galleries open", "dow": "13,233", "gas": "3.64", "bread": "", "income": "51,017", "frontpage": "An Iraq veteran snaps and kills five girls in a Gilroy tragedy; the man then turns the gun on his sister and himself. Police believe the missing mother was also shot in the incident.", "oakland_long": "Oakland was experiencing a renaissance. Tech spillover from San Francisco was bringing new money, new restaurants, and new energy. The First Friday art walks in the Uptown district drew tens of thousands of people. New galleries, boutiques, and restaurants were opening every week. The foodie world was discovering what Oakland's diverse communities had always known — this city has some of the best food in America, from Chinatown dim sum to Ethiopian injera to Southern BBQ to Mexican street tacos. The Tribune was still reporting, but the paper was struggling financially."}, "2013": {"president": "Barack Obama", "event": "Boston Marathon bombing; Snowden revelations; Pope Francis elected; Mandela dies; #BlackLivesMatter founded by Alicia Garza, Patrisse Cullors, and Opal Tometi", "culture": "#1 album: Beyoncé surprise-drops self-titled visual album, changing how music is released forever; Chance the Rapper’s 'Acid Rap'", "price": "Gas: $3.51/gal · Avg income: $51,939", "oakland": "Oakland's food and arts scene booms; city named a top US destination", "dow": "14,452", "gas": "3.51", "bread": "", "income": "51,939", "frontpage": "The U.S. sends a team home as it counters North Korea. The Pentagon plans to deploy missile interceptors on the West Coast after threats.", "oakland_long": "Oakland was named one of the top travel destinations in the country, and locals had mixed feelings about it. On one hand, the recognition was long overdue. On the other hand, the attention was accelerating gentrification and displacement. Housing costs were climbing fast, and the city's Black population — which had defined Oakland's culture for decades — was shrinking as families moved to Antioch, Stockton, and Sacramento in search of affordable housing. It was a bittersweet moment: Oakland was finally getting respect, but the Oakland that earned that respect was disappearing."}, "2014": {"president": "Barack Obama", "event": "Ferguson protests after Michael Brown killing; Eric Garner dies in NYPD chokehold — 'I can’t breathe'; ISIS rises; Russia annexes Crimea", "culture": "#1 song: Pharrell Williams — 'Happy'; D’Angelo returns with 'Black Messiah' after 14-year hiatus; J. Cole’s '2014 Forest Hills Drive' goes platinum with no features", "price": "Gas: $3.37/gal · Avg income: $53,657", "oakland": "Black Lives Matter protests in Oakland; Libby Schaaf elected mayor", "dow": "16,108", "gas": "3.37", "bread": "", "income": "53,657", "frontpage": "Central Coast wineries are bearing fruit as March Madness coverage shows Stanford and Cal await Selection Sunday. The missing Malaysian jet becomes a ghost flight that flew for 7 hours.", "oakland_long": "Black Lives Matter came to Oakland in a big way after the killings of Michael Brown and Eric Garner. Thousands marched down Broadway, shut down freeways, and made their voices heard. This was a city built on protest, and it answered the call. Libby Schaaf was elected mayor, promising to balance development with equity. The A's stadium saga dragged on — would they stay or go? The Warriors were getting good, finally, and Oracle Arena was becoming the hottest ticket in town. Oakland was changing fast, and not everyone was happy about it."}, "2015": {"president": "Barack Obama", "event": "Same-sex marriage legalized; Paris attacks; Iran nuclear deal; Charleston church massacre kills 9 Black worshippers; Loretta Lynch sworn in as first Black woman Attorney General", "culture": "#1 album: Kendrick Lamar — 'To Pimp a Butterfly' blends jazz, funk, and hip-hop into a landmark statement on race in America", "price": "Gas: $2.45/gal · Avg income: $56,516", "oakland": "Warriors win NBA title; Oakland becomes national foodie destination", "dow": "17,749", "gas": "2.45", "bread": "", "income": "56,516", "frontpage": "The front page leads with March Madness bracket coverage and talks of dance. Apple's ResearchKit could be a boon for medical research; an arrest is made in officers' shooting case.", "oakland_long": "The Warriors won the NBA championship, and Oakland lost its mind in the best possible way. The parade down Broadway drew over a million people — the whole Bay Area came to Oakland to celebrate. Steph Curry was the new king of the town, and Oracle Arena — 'Roaracle' — was the loudest building in sports. Oakland was also becoming a national foodie destination, with restaurants like Commis earning Michelin stars. But the housing crisis was getting worse, and longtime residents were being priced out at an alarming rate. The city was caught between its past and its future."}, "2016": {"president": "Barack Obama", "event": "Trump elected president; Brexit vote; Pulse nightclub shooting; Cubs win World Series; Colin Kaepernick kneels during national anthem, sparking nationwide protest movement", "culture": "#1 album: Beyoncé — 'Lemonade' becomes a cultural phenomenon; Chance the Rapper's 'Coloring Book' first streaming-only Grammy winner; Solange's 'A Seat at the Table'", "price": "Gas: $2.14/gal · Avg income: $59,039", "oakland": "Ghost Ship fire kills 36; Oakland Tribune publishes its final edition this year — 50 years of your birthday front pages end here", "dow": "17,481", "gas": "2.14", "bread": "", "income": "59,039", "frontpage": "The front page leads with 'Mega Tuesday' primary results as Trump and Clinton advance their leads. A local hero story features a man who saved children whose parents died in a minivan crash.", "oakland_long": "The Ghost Ship warehouse fire on December 2nd killed 36 people at an electronic music event in the Fruitvale district. It was Oakland's deadliest disaster in years, and it exposed the dangerous conditions in the underground art spaces that had become a hallmark of the city's creative culture. The tragedy prompted crackdowns on warehouse living spaces citywide. And in a quieter but equally significant loss, the Oakland Tribune published its final edition — after 142 years, the paper that had chronicled your dad's city, that had published his birthday front pages, was gone. Fifty years of birthday front pages end here.", "personal_photo": "birthday_book_images/personal_2016.jpg", "personal_caption": "John and Sheneen, back in Oakland"}, "2017": {"president": "Donald Trump", "event": "Trump inaugurated; travel ban protests nationwide; Charlottesville rally; Hurricane Harvey; #MeToo movement goes viral; Colin Kaepernick remains unsigned", "culture": "#1 album: Kendrick Lamar — 'DAMN.' wins Pulitzer Prize for Music (first non-classical/jazz winner); Jay-Z's '4:44' addresses Black wealth", "price": "Gas: $2.39/gal · Avg income: $61,372", "oakland": "Oakland warehouse safety crackdowns follow Ghost Ship; Warriors head to NBA Finals again from Oracle Arena", "dow": "20,934", "gas": "2.39", "bread": "", "income": "61,372", "frontpage": "A suspect flees on foot after a vehicle swarm on the Bay Bridge leads to a dramatic chase and arrest. The paper covers a Hells Angels meth probe.", "ebt": true, "wayback": "https://web.archive.org/web/20170316/https://www.eastbaytimes.com/", "oakland_long": "Oakland was still mourning the Ghost Ship fire, and warehouse safety crackdowns were displacing artists and musicians who had made the city's creative scene so vibrant. The Warriors were back in the NBA Finals, playing their last seasons at Oracle Arena before the function animateCounter(el, from, to, duration, fmt) {
  duration = duration || 1800;
  const s = performance.now();
  !function tick(n) {
    const p = Math.min((n - s) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    const cur = from + (to - from) * eased;
    el.textContent = fmt ? fmt(cur) : Math.round(cur).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  }(s);
}

var shownDecades = {};
function goIdx(i) {
  if (i < 0 || i >= YRS.length) return;

  if (curIdx >= 0 && i > curIdx) {
    const oldDecade = Math.floor(YRS[curIdx] / 10) * 10;
    const newDecade = Math.floor(YRS[i] / 10) * 10;
    if (oldDecade !== newDecade && DECADES[newDecade] && !shownDecades[newDecade]) {
      shownDecades[newDecade] = true;
      showDecadeInterstitial(newDecade, () => renderYear(i));

    }
  }
  renderYear(i);
}
function goDir(d) {

}
function showDecadeInterstitial(decade, callback) {

const sI = document.getElementById('searchInput');
let sT;
sI.addEventListener('input', () => { clearTimeout(sT); sT = setTimeout(doSearch, 250); });
function doSearch() {
  const q = sI.value.trim().toLowerCase();
  if (!q || q.length < 2) return closeSearch();
  const m = [], my = new Set();
  for (const [yr, txt] of Object.entries(SEARCH_INDEX)) {
    const l = txt.toLowerCase(), i = l.indexOf(q);
    if (i !== -1) { my.add(yr); const s = Math.max(0,i-60), e = Math.min(txt.length,i+q.length+60); let sn = (s>0?'...':'')+txt.slice(s,e)+(e<txt.length?'...':''); const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); sn = sn.replace(re,'<mark>$1</mark>'); m.push({year:+yr,snippet:sn,age:yr-1966}); }
  }
  for (const [yr, hh] of Object.entries(HISTORY)) {
    if (my.has(yr)) continue; if (Object.values(hh).join(' ').toLowerCase().includes(q)) { my.add(yr); const f = Object.entries(hh).find(([,v])=>v.toLowerCase().includes(q)); if (f) { const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); m.push({year:+yr,snippet:f[1].replace(re,'<mark>$1</mark>'),age:yr-1966}); } }
  }
  m.sort((a,b)=>a.year-b.year);
  document.getElementById('soCount').textContent = m.length + ' match' + (m.length!==1?'es':'');
  document.getElementById('soCards').innerHTML = m.map(x => '<div class="so-card" onclick="goIdx('+YRS.indexOf(x.year)+');closeSearch()"><div class="so-yr">'+x.year+'<small>Age '+x.age+'</small></div><div class="so-snip">'+x.snippet+'</div></div>').join('');

}

function genTrv() {
  const qs = [], yy = YRS.filter(y => HISTORY[y]);
  for (let i = 0; i < 20 && qs.length < 8; i++) {
    const ry = yy[Math.floor(Math.random()*yy.length)], h = HISTORY[ry], t = Math.floor(Math.random()*4);
    if (t===0 && h.gas) { const o = yy.filter(y=>y!==ry&&HISTORY[y].gas).sort(()=>Math.random()-0.5).slice(0,3).map(y=>'$'+HISTORY[y].gas); if(o.length>=2){qs.push({cat:'Cost of Living',q:'In '+ry+', how much did a gallon of gas cost?',a:'$'+h.gas,opts:['$'+h.gas,...o].sort(()=>Math.random()-0.5)});} }
    else if (t===1 && h.president) { const ap=[...new Set(yy.map(y=>HISTORY[y].president).filter(Boolean))],o=ap.filter(p=>p!==h.president).sort(()=>Math.random()-0.5).slice(0,3); if(o.length>=2){qs.push({cat:'Presidents',q:'Who was president on your birthday in '+ry+'?',a:h.president,opts:[h.president,...o].sort(()=>Math.random()-0.5)});} }
    else if (t===2 && h.income) { const o=yy.filter(y=>y!==ry&&HISTORY[y].income).sort(()=>Math.random()-0.5).slice(0,3).map(y=>'$'+HISTORY[y].income); if(o.length>=2){qs.push({cat:'Economics',q:'What was the average income in '+ry+'?',a:'$'+h.income,opts:['$'+h.income,...o].sort(()=>Math.random()-0.5)});} }
    else if (t===3 && h.dow) { const o=yy.filter(y=>y!==ry&&HISTORY[y].dow).sort(()=>Math.random()-0.5).slice(0,3).map(y=>HISTORY[y].dow); if(o.length>=2){qs.push({cat:'Stock Market',q:'Where was the Dow Jones in '+ry+'?',a:h.dow,opts:[h.dow,...o].sort(()=>Math.random()-0.5)});} }
  }
  return qs;
}

/* ═══════ STARFIELD ═══════ */
function initStarfield() {
  const cvs = document.getElementById('starfieldCvs');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  const cover = cvs.parentElement;
  cvs.width = cover.offsetWidth; cvs.height = cover.offsetHeight;
  const stars = [];
  const colors = ['rgba(240,184,72,','rgba(80,160,232,','rgba(240,96,144,','rgba(160,112,208,','rgba(92,201,160,','rgba(255,255,255,'];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * cvs.width, y: Math.random() * cvs.height,
      r: 0.4 + Math.random() * 1.8,
      color: colors[Math.floor(Math.random() * colors.length)],
      phase: Math.random() * Math.PI * 2,
      speed: 0.003 + Math.random() * 0.008,
      drift: (Math.random() - 0.5) * 0.15
    });
  }
  let raf;
  function draw(t) {
    if (!document.getElementById('starfieldCvs')) return;
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    stars.forEach(s => {
      const a = 0.2 + 0.5 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      s.y += s.drift;
      if (s.y < -5) s.y = cvs.height + 5;
      if (s.y > cvs.height + 5) s.y = -5;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + a + ')';
      ctx.fill();
      if (s.r > 1.2) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = s.color + (a * 0.1) + ')';
        ctx.fill();
      }
    });
    raf = requestAnimationFrame(draw);
  }
  raf = requestAnimationFrame(draw);
  window._starfieldRaf = raf;
}

/* ═══════ CONFETTI ═══════ */
function launchConfetti() {
  const cover = document.querySelector('.cover-view');
  if (!cover) return;
  const cvs = document.createElement('canvas');
  cvs.id = 'confettiCvs';
  cover.appendChild(cvs);
  const ctx = cvs.getContext('2d');
  cvs.width = cover.offsetWidth; cvs.height = cover.offsetHeight;
  const colors = ['#f0b848','#e87850','#f06090','#50a0e8','#40c890','#a070d0','#ffffff','#f0d070'];
  const particles = [];
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: cvs.width * 0.5 + (Math.random()-0.5) * 80,
      y: cvs.height * 0.35,
      w: 3 + Math.random() * 5, h: 6 + Math.random() * 10,
      r: Math.random() * Math.PI * 2, rv: (Math.random()-0.5) * 0.14,
      vy: -(3 + Math.random() * 5), vx: (Math.random()-0.5) * 8,
      color: colors[Math.floor(Math.random() * colors.length)], opacity: 1
    });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, cvs.width, cvs.height); frame++;
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.r += p.rv;
      p.vy += 0.09; p.vx *= 0.995;
      if (frame > 140) p.opacity = Math.max(0, p.opacity - 0.014);
      if (p.opacity <= 0 || p.y > cvs.height + 30) return;
      alive = true;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    });
    if (alive) requestAnimationFrame(draw); else cvs.remove();
  }
  requestAnimationFrame(draw);
}

  });
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    var tmp = items[i]; items[i] = items[j]; items[j] = tmp;

  }).join('<span class="ticker-dot">\u00b7</span>');

}

      vy: -0.1 - Math.random() * 0.3,

      speed: 0.001 + Math.random() * 0.003
    });

/* ═══════ 3D TILT ON NEWSPAPER ═══════ */
function init3DTilt() {
  document.addEventListener('mousemove', function(e) {
    // Update cursor position for spotlight
    document.documentElement.style.setProperty('--cursor-x', e.clientX + 'px');
    document.documentElement.style.setProperty('--cursor-y', e.clientY + 'px');

    const wrap = document.querySelector('.np-wrap');
    if (!wrap || innerWidth < 900) return;
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / rect.width;
    const dy = (e.clientY - cy) / rect.height;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1.5) {
      wrap.classList.add('tilt-active');
      const rotY = dx * 6;
      const rotX = -dy * 4;
      wrap.style.transform = 'perspective(800px) rotateY(' + rotY + 'deg) rotateX(' + rotX + 'deg) scale(1.01)';
      // Update shine position
      const shine = wrap.querySelector('.tilt-shine');
      if (shine) {
        shine.style.setProperty('--mx', ((dx + 0.5) * 100) + '%');
        shine.style.setProperty('--my', ((dy + 0.5) * 100) + '%');
      }
    } else {
      wrap.classList.remove('tilt-active');
      wrap.style.transform = '';
    }
  });
  document.addEventListener('mouseleave', function() {
    const wrap = document.querySelector('.np-wrap');
    if (wrap) { wrap.classList.remove('tilt-active'); wrap.style.transform = ''; }
  });
}
