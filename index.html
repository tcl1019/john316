  document.getElementById('progressFill').style.width = (count / 60 * 100) + '%';
  if (count >= 60) {
    document.getElementById('progressLabel').textContent = 'All explored!';
  }
}

/* ═══════ KEYBOARD HINTS TOAST ═══════ */
function showKeyboardHints() {
  if (sessionStorage.getItem('kbdShown')) return;
  sessionStorage.setItem('kbdShown', '1');
  setTimeout(function() {
    var toast = document.createElement('div');
    toast.className = 'kbd-toast';
    toast.innerHTML =
      '<div class="kbd-toast-title">Keyboard Shortcuts</div>' +
      '<div class="kbd-row"><span class="kbd-key">←</span><span class="kbd-key">→</span><span class="kbd-desc">Navigate years</span></div>' +
      '<div class="kbd-row"><span class="kbd-key">/</span><span class="kbd-desc">Search headlines</span></div>' +
      '<div class="kbd-row"><span class="kbd-key">M</span><span class="kbd-desc">Open menu</span></div>' +
      '<div class="kbd-row"><span class="kbd-key">R</span><span class="kbd-desc">Random year</span></div>' +
      '<button class="kbd-dismiss" onclick="this.parentElement.classList.add(\'hiding\');setTimeout(function(){document.querySelector(\'.kbd-toast\').remove()},400)">Got it</button>';
    document.body.appendChild(toast);
    setTimeout(function() {
      var t = document.querySelector('.kbd-toast');
      if (t && !t.classList.contains('hiding')) {
        t.classList.add('hiding');
        setTimeout(function() { if (t.parentNode) t.remove(); }, 400);
      }
    }, 8000);
  }, 3000);
}

/* ═══════ IMAGE SHIMMER ═══════ */
function addImageShimmer() {
  var wraps = document.querySelectorAll('.np-wrap');
  wraps.forEach(function(wrap) {
    var img = wrap.querySelector('img');
    if (!img) return;
    // Add shine overlay for 3D tilt
    if (!wrap.querySelector('.tilt-shine')) {
      var shine = document.createElement('div');
      shine.className = 'tilt-shine';
      wrap.appendChild(shine);
    }
    if (img.complete && img.naturalWidth) return;
    wrap.classList.add('loading');
    img.addEventListener('load', function() { wrap.classList.remove('loading'); });
    img.addEventListener('error', function() { wrap.classList.remove('loading'); });
  });
}

/* ═══════ YEAR NAV ARROWS ═══════ */
function addYearNavArrows() {
  var stage = document.getElementById('stage');
  var existing = stage.querySelectorAll('.year-nav-arrow');
  existing.forEach(function(e) { e.remove(); });
  if (curIdx < 0) return;
  var left = document.createElement('button');
  left.className = 'year-nav-arrow left';
  left.innerHTML = '‹';
  left.title = 'Previous year';
  left.onclick = function() { goDir(-1); };
  if (curIdx <= 0) left.style.display = 'none';
  var right = document.createElement('button');
  right.className = 'year-nav-arrow right';
  right.innerHTML = '›';
  right.title = 'Next year';
  right.onclick = function() { goDir(1); };
  if (curIdx >= YRS.length - 1) right.style.display = 'none';
  stage.appendChild(left);
  stage.appendChild(right);
  setTimeout(function() { left.style.opacity = ''; right.style.opacity = ''; }, 100);
}

/* ═══════ SWIPE (mobile-aware) ═══════ */
let tsx=0, tsy=0, tsTime=0, tsTracking=false;
document.getElementById('stage').addEventListener('touchstart', function(e) {
  tsx = e.touches[0].clientX; tsy = e.touches[0].clientY;
  tsTime = Date.now(); tsTracking = true;
}, { passive: true });
document.getElementById('stage').addEventListener('touchmove', function(e) {
  if (!tsTracking) return;
  const dx = e.touches[0].clientX - tsx;
  const dy = e.touches[0].clientY - tsy;
  if (Math.abs(dx) > 20 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    const view = document.querySelector('.year-view');
    if (view) view.style.transform = 'translateX(' + (dx * 0.1) + 'px)';
  }
}, { passive: true });
document.getElementById('stage').addEventListener('touchend', function(e) {
  if (!tsTracking) return; tsTracking = false;
  const dx = e.changedTouches[0].clientX - tsx;
  const dy = e.changedTouches[0].clientY - tsy;
  const elapsed = Date.now() - tsTime;
  const view = document.querySelector('.year-view');
  if (view) { view.style.transition = 'transform 0.3s var(--ease-out-expo)'; view.style.transform = ''; setTimeout(function() { if (view) view.style.transition = ''; }, 300); }
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.3 && elapsed < 500) {
    dx < 0 ? goDir(1) : goDir(-1);
  }
}, { passive: true });

/* ═══════ INIT ═══════ */
buildSidebar(); buildTL(); showCover();
initAmbientParticles();
init3DTilt();
showKeyboardHints();
</script>
